<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelScan Pro | Advanced Security Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&display=swap');
        
        body {

            font-family: 'JetBrains Mono', monospace;
            background: radial-gradient(circle at top left, #0f172a, #020617 70%);
            color: #94a3b8;
            overflow-x: hidden;
        }

        /* Particles Background */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.4;
        }

        .cyber-glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .neon-text-blue { text-shadow: 0 0 10px rgba(239, 68, 68, 0.8); }
        .neon-border-red { border: 1px solid rgba(239, 68, 68, 0.4); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }

        .scan-pulse {
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
            linear-gradient(rgba(239,68,68,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(239,68,68,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        .scan-line {
            position: fixed;
            width: 100%;
            height: 2px;
            background: rgba(239, 68, 68, 0.4);
            box-shadow: 0 0 15px #ef4444;
            animation: scanMove 4s linear infinite;
            z-index: -1;
        }

@keyframes scanMove {
    0% { top: 0%; }
    100% { top: 100%; }
}
    </style>
</head>
<body class="min-h-screen">
    <div class="scan-line"></div>

    <canvas id="bg-canvas"></canvas>

    <nav class="p-6 border-b border-slate-800 cyber-glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i data-lucide="shield-check" class="text-red-500 w-8 h-8"></i>
                <h1 class="text-2xl font-bold text-white tracking-tighter neon-text-blue">VULN-X HUNTERT <span class="text-blue-500 text-sm">V3.0</span></h1>
            </div>
            <div class="hidden md:flex gap-6 text-[10px] uppercase tracking-widest font-bold">
                <span class="text-green-500">System: Online</span>
                <span class="text-slate-500">Port: 5000</span>
                <span class="text-blue-500">Mode: Real-Time Audit</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="cyber-glass p-8 rounded-3xl border-t-2 border-t-blue-500">
                <h2 class="text-white font-bold mb-6 flex items-center gap-2 underline decoration-blue-500 underline-offset-8">TARGET_INPUT</h2>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] text-slate-500 mb-2 block uppercase tracking-widest">Web Endpoint</label>
                        <input id="targetUrl" type="text" placeholder="https://target-site.com" 
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-blue-400 focus:outline-none focus:border-blue-500 transition-all shadow-inner">
                    </div>
                    <button onclick="startRealScan()" class="scan-pulse w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-xl font-bold uppercase tracking-widest transition-all">
                        Launch Security Audit
                    </button>
                </div>
            </div>

            <div id="resultPanel" class="cyber-glass p-6 rounded-3xl hidden neon-border-red">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-bold text-red-400 uppercase tracking-widest">Live Vulnerability Report</h3>
                    <i data-lucide="activity" class="w-4 h-4 text-red-500 animate-pulse"></i>
                </div>
                <div id="headerResults" class="space-y-3 font-mono text-[11px]">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="flex justify-between items-end">
                <h2 class="text-xl font-bold text-white">OWASP TOP 10 FRAMEWORK (2021)</h2>
                <p class="text-[10px] text-slate-500">Security Standard Compliance</p>
            </div>
            
            <div id="owasp-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>
    </main>

    <script>
        // Background Animation Logic
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = '#ef4444';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ef4444';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        function init() {
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init(); animate();

        // Real Backend Logic
        async function startRealScan() {
            const url = document.getElementById('targetUrl').value;
            if (!url) return alert("Enter a target URL first!");

            const resultPanel = document.getElementById('resultPanel');
            const headerResults = document.getElementById('headerResults');
            
            resultPanel.classList.remove('hidden');
            headerResults.innerHTML = `<div class="p-4 border border-blue-500/30 rounded bg-blue-500/5 text-blue-400 animate-pulse text-center">
                Interrogating Server Headers...
            </div>`;

            try {
                const response = await fetch('/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const result = await response.json();

                if (result.status === "success") {
                    const data = result.data["A05: Security Misconfiguration"];
                    headerResults.innerHTML = "";
                    
                    for (let key in data) {
                        const isSafe = data[key] === "Safe";
                        headerResults.innerHTML += `
                            <div class="p-3 bg-slate-900/80 rounded border-l-2 ${isSafe ? 'border-green-500' : 'border-red-500'}">
                                <div class="flex justify-between items-center">
                                    <span class="text-slate-400 uppercase text-[9px] font-bold">${key}</span>
                                    <span class="${isSafe ? 'text-green-400' : 'text-red-400'} text-[10px] font-bold">${data[key]}</span>
                                </div>
                            </div>`;
                    }
                }
            } catch (err) {
                headerResults.innerHTML = `<div class="p-4 border border-red-500/30 rounded bg-red-500/5 text-red-400 text-center text-[10px]">
                    FATAL: FAILED TO CONNECT TO BACKEND<br>Check Termux status.
                </div>`;
            }
        }

        // Detailed OWASP Data
        const detailedVulnerabilities = [
            { 
                id: "A01", 
                title: "Broken Access Control", 
                risk: "Critical", 
                info: "Users can access unauthorized files or admin pages.",
                fix: "Implement strict Role-Based Access Control (RBAC)."
            },
            { 
                id: "A03", 
                title: "Injection (SQLi/XSS)", 
                risk: "High", 
                info: "Malicious code entered into input fields can steal data.",
                fix: "Use Parameterized Queries and sanitize all inputs."
            },
            { 
                id: "A05", 
                title: "Security Misconfiguration", 
                risk: "Medium", 
                info: "Missing security headers or default passwords.",
                fix: "Harden server headers (X-Frame, CSP) and update software."
            },
            { 
                id: "A02", 
                title: "Cryptographic Failures", 
                risk: "High", 
                info: "Sensitive data (passwords) sent in plain text.",
                fix: "Use TLS 1.3 and strong hashing like Argon2 or bcrypt."
            }
        ];

        document.getElementById('owasp-grid').innerHTML = detailedVulnerabilities.map(v => `
            <div class="cyber-glass p-6 rounded-3xl border-b-4 ${v.risk === 'Critical' ? 'border-red-600' : 'border-blue-600'} hover:translate-y-[-5px] transition-all cursor-default">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-slate-800 text-blue-400 text-[9px] px-2 py-1 rounded font-bold tracking-widest">${v.id}</span>
                    <span class="text-[9px] font-bold uppercase ${v.risk === 'Critical' ? 'text-red-500' : 'text-blue-500'}">${v.risk} RISK</span>
                </div>
                <h4 class="text-white font-bold text-sm mb-2 uppercase">${v.title}</h4>
                <p class="text-[10px] text-slate-400 leading-relaxed mb-4 italic">"${v.info}"</p>
                <div class="p-3 bg-slate-900/50 rounded-xl border border-slate-800">
                    <p class="text-[9px] text-green-500 font-bold uppercase mb-1">Recommended Fix:</p>
                    <p class="text-[9px] text-slate-300 font-mono">${v.fix}</p>
                </div>
            </div>
        `).join('');

        lucide.createIcons();
    </script>
</body>
</html>
